<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IVMS – Officer Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blue-950: #0a192f;
            --blue-900: #0f2a4a;
            --blue-800: #173d6e;
            --blue-700: #1e4d8c;
            --blue-600: #2563eb;
            --blue-500: #3b82f6;
            --blue-400: #60a5fa;
            --gold: #fbbf24;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: #e2e8f0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .app-wrapper {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }

        .status-bar {
            height: 48px;
            background: transparent;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            color: #fff;
        }

        .status-bar .time {
            font-size: 0.85rem;
            font-weight: 700;
        }

        .status-icons {
            display: flex;
            gap: 0.6rem;
            font-size: 0.85rem;
        }

        /* Hero Header */
        .hero-header {
            background: linear-gradient(145deg, var(--blue-950), var(--blue-800));
            padding: 5rem 1.5rem 3.5rem;
            position: relative;
            color: #fff;
            flex-shrink: 0;
        }

        .hero-header::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.15) 0%, transparent 70%);
            top: -50px;
            right: -100px;
        }

        .hero-header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,%3Csvg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="%23ffffff" fill-opacity="0.03" fill-rule="evenodd"%3E%3Ccircle cx="3" cy="3" r="3"/%3E%3Ccircle cx="13" cy="13" r="3"/%3E%3C/g%3E%3C/svg%3E');
        }

        .top-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        .title-group h1 {
            font-size: 1.1rem;
            font-weight: 800;
            color: #fff;
        }

        .title-group p {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Scrollable Form Content */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1rem 100px;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            position: relative;
            z-index: 2;
            background: var(--bg);
            border-radius: 30px 30px 0 0;
            margin-top: -2rem;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            -webkit-overflow-scrolling: touch;
        }

        .scroll-content::-webkit-scrollbar {
            display: none;
        }

        /* Form Sections */
        .form-section {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0,0,0,0.02);
            overflow: hidden;
        }

        .fs-head {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--text);
            background: rgba(248, 250, 252, 0.5);
        }

        .fs-head i {
            color: var(--blue-600);
            font-size: 1rem;
        }

        .fs-body {
            padding: 1.2rem;
        }

        .fg {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }

        .fg:last-child {
            margin-bottom: 0;
        }

        .fg label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text);
        }

        .iw {
            position: relative;
        }

        .iw i.fi {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.9rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .iw input, .iw select {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.5rem;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--text);
            background: #fafafa;
            transition: all 0.2s;
            appearance: none;
            font-family: 'Inter', sans-serif;
        }

        .iw input:focus, .iw select:focus {
            outline: none;
            border-color: var(--blue-600);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .iw input:focus + i.fi,
        .iw select:focus + i.fi,
        .iw input:not(:placeholder-shown) ~ i.fi {
            color: var(--blue-600);
        }

        .eye {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        /* Access Buttons */
        .access-row {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.2rem;
        }

        .access-btn {
            flex: 1;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 0.8rem 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: #fff;
        }

        .access-btn i {
            display: block;
            font-size: 1.2rem;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }

        .access-btn span {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
        }

        .access-btn.active {
            border-color: var(--blue-600);
            background: rgba(37, 99, 235, 0.05);
        }

        .access-btn.active i,
        .access-btn.active span {
            color: var(--blue-600);
        }

        /* Check row */
        .check-row {
            display: flex;
            gap: 0.8rem;
            align-items: flex-start;
            font-size: 0.85rem;
            color: var(--text);
            line-height: 1.5;
        }

        .check-row input {
            width: 18px;
            height: 18px;
            accent-color: var(--blue-600);
            margin-top: 0.1rem;
            flex-shrink: 0;
        }

        /* Action Bar */
        .action-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
            padding: 1rem 1.5rem;
            display: flex;
            gap: 0.8rem;
            z-index: 100;
        }

        .ab-btn {
            flex: 1;
            padding: 1rem;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .ab-back {
            background: #fff;
            border: 1.5px solid var(--border);
            color: var(--muted);
        }

        .ab-back:active {
            background: #f1f5f9;
        }

        .ab-submit {
            background: linear-gradient(135deg, var(--blue-700), var(--blue-600));
            color: #fff;
            border: none;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .ab-submit:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="app-wrapper">
        <div class="status-bar">
            <span class="time">9:41</span>
            <div class="status-icons">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
        </div>

        <div class="hero-header">
            <div class="top-row">
                <button class="back-btn" onclick="window.location.href='officer_login.html'">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="title-group">
                    <h1>Officer Registration</h1>
                    <p>Step 2 of 3</p>
                </div>
            </div>
        </div>

        <div class="scroll-content">
            
            <div class="form-section">
                <div class="fs-head"><i class="fa-solid fa-user"></i> Personal Details</div>
                <div class="fs-body">
                    <div class="two-col">
                        <div class="fg">
                            <label>First Name</label>
                            <div class="iw">
                                <i class="fa-regular fa-user fi"></i>
                                <input type="text" placeholder="Asad">
                            </div>
                        </div>
                        <div class="fg">
                            <label>Last Name</label>
                            <div class="iw">
                                <i class="fa-regular fa-user fi"></i>
                                <input type="text" placeholder="Khan">
                            </div>
                        </div>
                    </div>
                    <div class="fg">
                        <label>CNIC</label>
                        <div class="iw">
                            <i class="fa-regular fa-id-card fi"></i>
                            <input type="text" placeholder="37405-xxxxxxx-x">
                        </div>
                    </div>
                    <div class="fg">
                        <label>Contact Number</label>
                        <div class="iw">
                            <i class="fa-solid fa-phone fi"></i>
                            <input type="tel" placeholder="0300-xxxxxxx">
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="fs-head"><i class="fa-solid fa-id-badge"></i> Officer Credentials</div>
                <div class="fs-body">
                    <div class="fg">
                        <label>Belt Number / Staff ID</label>
                        <div class="iw">
                            <i class="fa-solid fa-address-card fi"></i>
                            <input type="text" placeholder="NHMP-xxxx">
                        </div>
                    </div>
                    <div class="two-col">
                        <div class="fg">
                            <label>Designation</label>
                            <div class="iw">
                                <i class="fa-solid fa-ranking-star fi"></i>
                                <select>
                                    <option disabled selected>Select</option>
                                    <option>Patrol Officer</option>
                                    <option>Senior Patrol</option>
                                    <option>Inspector</option>
                                </select>
                            </div>
                        </div>
                        <div class="fg">
                            <label>Duty Zone</label>
                            <div class="iw">
                                <i class="fa-solid fa-location-dot fi"></i>
                                <select>
                                    <option disabled selected>Select</option>
                                    <option>M2 North</option>
                                    <option>M2 South</option>
                                    <option>M1</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="fs-head"><i class="fa-solid fa-lock"></i> Account Security</div>
                <div class="fs-body">
                    <div class="fg">
                        <label>Create Password</label>
                        <div class="iw">
                            <i class="fa-solid fa-lock fi"></i>
                            <input type="password" id="p1" placeholder="••••••••">
                            <button class="eye" onclick="tp('p1','e1')"><i id="e1" class="fa-regular fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="fg">
                        <label>Confirm Password</label>
                        <div class="iw">
                            <i class="fa-solid fa-lock fi"></i>
                            <input type="password" id="p2" placeholder="••••••••">
                            <button class="eye" onclick="tp('p2','e2')"><i id="e2" class="fa-regular fa-eye"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="fs-head"><i class="fa-solid fa-file-signature"></i> Consent & Policy</div>
                <div class="fs-body">
                    <label class="check-row">
                        <input type="checkbox"> 
                        <span>I confirm that all details provided are true and belong to my official NH&MP records.</span>
                    </label>
                    <label class="check-row" style="margin-top: 0.8rem;">
                        <input type="checkbox"> 
                        <span>I agree to use this portal solely for official duties and understand that all actions are audited.</span>
                    </label>
                </div>
            </div>

        </div>

        <div class="action-bar">
            <button class="ab-btn ab-back" onclick="window.location.href='officer_login.html'">Cancel</button>
            <button class="ab-btn ab-submit" onclick="window.location.href='../dashboards/officer_dashboard.html'">
                Continue <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <script>
        function tp(id, ico) { 
            const i = document.getElementById(id); 
            const e = document.getElementById(ico); 
            if(i.type === 'password') {
                i.type = 'text';
                e.className = 'fa-regular fa-eye-slash';
                e.style.color = 'var(--blue-700)';
            } else {
                i.type = 'password';
                e.className = 'fa-regular fa-eye';
                e.style.color = 'var(--muted)';
            }
        }
    </script>
</body>
</html>
