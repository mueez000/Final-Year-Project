<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IVMS – Officer Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blue-950: #0a192f;
            --blue-900: #0f2a4a;
            --blue-800: #173d6e;
            --blue-700: #1e4d8c;
            --blue-600: #2563eb;
            --blue-500: #3b82f6;
            --blue-400: #60a5fa;
            --gold: #fbbf24;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: #e2e8f0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .app-wrapper {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }

        .status-bar {
            height: 48px;
            background: transparent;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            color: #fff;
        }

        .status-bar .time {
            font-size: 0.85rem;
            font-weight: 700;
        }

        .status-icons {
            display: flex;
            gap: 0.6rem;
            font-size: 0.85rem;
        }

        /* Hero Header */
        .hero-header {
            background: linear-gradient(145deg, var(--blue-950), var(--blue-800));
            padding: 5rem 1.5rem 3.5rem;
            position: relative;
            color: #fff;
        }

        .hero-header::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.15) 0%, transparent 70%);
            top: -50px;
            right: -100px;
        }

        .hero-header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,%3Csvg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="%23ffffff" fill-opacity="0.03" fill-rule="evenodd"%3E%3Ccircle cx="3" cy="3" r="3"/%3E%3Ccircle cx="13" cy="13" r="3"/%3E%3C/g%3E%3C/svg%3E');
        }

        .back-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        .back-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
        }

        .role-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(96, 165, 250, 0.15);
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: var(--blue-400);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .hero-header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            line-height: 1.1;
            position: relative;
            z-index: 1;
            letter-spacing: -0.5px;
        }

        .hero-header p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.6rem;
            position: relative;
            z-index: 1;
            line-height: 1.5;
        }

        /* Form Card */
        .form-card {
            background: #fff;
            border-radius: 30px 30px 0 0;
            margin-top: -2rem;
            flex: 1;
            padding: 2.5rem 1.5rem 2rem;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 2;
        }

        .form-card h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 0.3rem;
            letter-spacing: -0.5px;
        }

        .form-card p {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .fg {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .fg label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text);
        }

        .iw {
            position: relative;
        }

        .iw i.fi {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 1rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .iw input {
            width: 100%;
            padding: 1rem 1.2rem 1rem 3rem;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            font-size: 0.95rem;
            color: var(--text);
            background: #fafafa;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .iw input:focus {
            outline: none;
            border-color: var(--blue-600);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .iw input:focus + i.fi,
        .iw input:not(:placeholder-shown) ~ i.fi {
            color: var(--blue-600);
        }

        .eye {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .eye:active {
            color: var(--blue-600);
        }

        .options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
            font-weight: 500;
        }

        .remember input {
            width: 16px;
            height: 16px;
            accent-color: var(--blue-600);
        }

        .forgot {
            color: var(--blue-700);
            font-weight: 700;
            text-decoration: none;
        }

        .login-btn {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--blue-700), var(--blue-600));
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* Biometric Row */
        .biometric-row {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .bio-btn {
            flex: 1;
            padding: 0.9rem;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .bio-btn:active {
            background: #f1f5f9;
            transform: scale(0.98);
        }

        .divider {
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 600;
            margin: 2rem 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1.5px;
            background: var(--border);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .register-link {
            text-align: center;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .register-link a {
            color: var(--blue-700);
            font-weight: 800;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="app-wrapper">
        <div class="status-bar">
            <span class="time">9:41</span>
            <div class="status-icons">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
        </div>

        <div class="hero-header">
            <div class="back-row">
                <button class="back-btn" onclick="window.location.href='login.html'">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <span class="back-label">Role Selection</span>
            </div>
            <div class="role-pill"><i class="fa-solid fa-user-shield"></i> Officer Portal</div>
            <h1>Welcome<br>Back, Officer</h1>
            <p>Sign in to access duty rosters, issue e-challans, and monitor your designated zones.</p>
        </div>

        <div class="form-card">
            <h2>Sign In</h2>
            <p>Use your official Belt / ID Number</p>

            <div class="fg">
                <label>Belt Number / Staff ID</label>
                <div class="iw">
                    <i class="fa-solid fa-id-badge fi"></i>
                    <input type="text" placeholder="NHMP-1234">
                </div>
            </div>
            <div class="fg">
                <label>Password</label>
                <div class="iw">
                    <i class="fa-solid fa-lock fi"></i>
                    <input type="password" id="p" placeholder="••••••••">
                    <button class="eye" onclick="tp()">
                        <i id="ei" class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="options-row">
                <label class="remember"><input type="checkbox"> Keep me signed in</label>
                <a href="#" class="forgot">Forgot password?</a>
            </div>

            <button class="login-btn" onclick="window.location.href='../dashboards/officer_dashboard.html'">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In as Officer
            </button>

            <div class="biometric-row">
                <button class="bio-btn" onclick="alert('Biometric authentication is not yet enabled.')">
                    <i class="fa-solid fa-fingerprint" style="color:var(--blue-600); font-size:1.1rem;"></i> Touch ID
                </button>
                <button class="bio-btn" onclick="alert('Biometric authentication is not yet enabled.')">
                    <i class="fa-solid fa-face-smile" style="color:var(--blue-600); font-size:1.1rem;"></i> Face ID
                </button>
            </div>

            <div class="divider">or</div>
            
            <div class="register-link">
                New on the force? <a href="officer_signup.html">Register here &rarr;</a>
            </div>
        </div>
    </div>
    
    <script>
        function tp() { 
            const i = document.getElementById('p'); 
            const e = document.getElementById('ei'); 
            if(i.type === 'password') {
                i.type = 'text';
                e.className = 'fa-regular fa-eye-slash';
                e.style.color = 'var(--blue-700)';
            } else {
                i.type = 'password';
                e.className = 'fa-regular fa-eye';
                e.style.color = 'var(--muted)';
            }
        }
    </script>
</body>
</html>
